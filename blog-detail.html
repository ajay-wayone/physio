<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - My Physio</title>
    <meta name="description" content="Read the latest blog from My Physio">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .blog-detail-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .blog-detail-header {
            margin-bottom: 40px;
        }

        .blog-detail-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .blog-detail-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            color: #666;
            font-size: 0.95rem;
        }

        .blog-detail-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 40px;
        }

        .blog-detail-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #333;
        }

        .blog-detail-content p {
            margin-bottom: 20px;
        }

        .blog-detail-content h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 40px 0 20px 0;
        }

        .blog-detail-content h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 30px 0 15px 0;
        }

        .blog-detail-content ul,
        .blog-detail-content ol {
            margin: 20px 0 20px 40px;
        }

        .blog-detail-content li {
            margin-bottom: 10px;
        }

        .blog-category-badge {
            display: inline-block;
            background-color: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.1rem;
        }

        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: #d32f2f;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .blog-detail-title {
                font-size: 1.8rem;
            }

            .blog-detail-image {
                height: 250px;
            }

            .blog-detail-content {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Header Section placeholder -->
    <div include-html="header.html"></div>

    <main>
        <div class="blog-detail-container">
            <a href="blogs.html" class="back-link">← Back to Blogs</a>

            <div id="loading" class="loading-spinner">
                <p>Loading blog...</p>
            </div>

            <div id="error-message" class="error-message" style="display: none;">
                <p>Failed to load blog. Please try again later.</p>
            </div>

            <article id="blog-content" style="display: none;">
                <div class="blog-detail-header">
                    <span class="blog-category-badge" id="blog-category"></span>
                    <h1 class="blog-detail-title" id="blog-title"></h1>
                    <div class="blog-detail-meta">
                        <span id="blog-date"></span>
                    </div>
                </div>

                <img id="blog-image" src="" alt="" class="blog-detail-image">

                <div class="blog-detail-content" id="blog-body"></div>
            </article>
        </div>
    </main>

    <!-- Main Footer placeholder -->
    <div include-html="footer.html"></div>

    <!-- HTML Inclusion Script -->
    <script src="js/include.js"></script>

    <!-- Configuration Script -->
    <script src="js/config.js"></script>

    <!-- Blog Detail Script -->
    <script>
        async function loadBlogDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const blogSlug = urlParams.get('slug');

            if (!blogSlug) {
                showError('No blog slug provided');
                return;
            }

            try {
                const API_URL = CONFIG.getBlogDetailUrl(blogSlug);
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    mode: 'cors',
                    credentials: 'omit'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (!data.data) {
                    throw new Error('Invalid API response format');
                }

                displayBlog(data.data);
            } catch (error) {
                console.error('Error loading blog:', error);
                console.error('API URL:', CONFIG.getBlogDetailUrl(blogSlug));
                showError(`Failed to load blog: ${error.message}`);
            }
        }

        function displayBlog(blog) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('blog-content').style.display = 'block';

            document.getElementById('blog-title').textContent = blog.title;
            document.getElementById('blog-category').textContent = blog.categoryName;
            document.getElementById('blog-image').src = blog.image || 'assets/images/Rectangle 3463644.png';
            document.getElementById('blog-image').alt = blog.title;

            const publishDate = new Date(blog.publishedAt).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('blog-date').textContent = publishDate;

            document.getElementById('blog-body').innerHTML = blog.content;

            // Update page title
            document.title = `${blog.title} - My Physio`;
        }

        function showError(message = 'Failed to load blog. Please try again later.') {
            document.getElementById('loading').style.display = 'none';
            const errorEl = document.getElementById('error-message');
            errorEl.style.display = 'block';
            errorEl.innerHTML = `<p>${message}</p><p style="font-size: 0.9rem; margin-top: 10px;">Make sure the API server is running and accessible.</p>`;
        }

        // Load blog on page load
        document.addEventListener('DOMContentLoaded', loadBlogDetail);
    </script>
</body>

</html>
