<style>
  /* Navigation Styles */
  .header-navigation {
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
  }

  .nav-item {
    position: relative;
    color: #fff;
    text-decoration: none;
    padding: 10px 12px 8px 12px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.2s;
    border: none;
    background: none;
    outline: none;
  }

  .nav-item:not(.dropdown)::after {
    content: '';
    display: block;
    height: 2px;
    width: 0;
    background: #fff;
    margin-left: auto;
    margin-right: auto;
    transition: width 0.3s;
    border-radius: 2px;
  }

  .nav-item:not(.dropdown):hover::after,
  .nav-item:not(.dropdown).active::after {
    width: 100%;
    margin-left: auto;
    margin-right: auto;
  }

  /* Dropdown Styles */
  .dropdown {
    position: relative;
    display: flex;
    align-items: center;
    height: 100%;
  }

  .dropdown-title {
    color: #fff;
    padding: 10px 12px 8px 12px;
    cursor: pointer;
    font-weight: 500;
    position: relative;
    background: none;
    border: none;
    outline: none;
    transition: color 0.2s;
  }

  .dropdown-title::after {
    content: '\25BC';
    font-size: 0.7em;
    margin-left: 6px;
    vertical-align: middle;
    color: #fff;
    transition: transform 0.2s;
    display: inline-block;
  }

  .dropdown:hover .dropdown-title::after {
    transform: rotate(180deg);
  }

  .dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    background: rgba(0, 150, 255, 0.98);
    display: none;
    flex-direction: column;
    min-width: 180px;
    border-radius: 0 0 10px 10px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    z-index: 1000;
    margin-top: 2px;
    padding: 0;
    /* border-top: 2px solid #fff; */
  }

  .dropdown:hover .dropdown-menu {
    display: flex;
  }

  .dropdown-menu .dropdown-item {
    position: relative;
    padding: 12px 18px;
    color: #fff;
    text-decoration: none;
    background: none;
    border: none;
    border-radius: 0 0 10px 10px;
    text-align: left;
    font-size: 1em;
    transition: background 0.2s, color 0.2s;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    outline: none;
  }

  .dropdown-menu .dropdown-item:last-child {
    border-bottom: none;
  }

  .dropdown-menu .dropdown-item::after {
    content: '';
    display: block;
    height: 2px;
    width: 0;
    background: #fff;
    margin-left: auto;
    margin-right: auto;
    transition: width 0.3s;
    border-radius: 2px;
  }

  .dropdown-menu .dropdown-item:hover::after,
  .dropdown-menu .dropdown-item:focus::after {
    width: 100%;
    margin-left: auto;
    margin-right: auto;
  }

  .dropdown-menu .dropdown-item:hover {
    background: rgba(0, 120, 220, 1);
    color: #fff;
  }

  .main-header {
    position: fixed;
    width: 90%;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background: rgba(0, 150, 255, 1);
    box-shadow: 0px 4px 12px rgba(255, 255, 255, 0.1);
    border-radius: 10px;
  }

  /* Hamburger button */
  .mobile-menu-btn {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 28px;
    height: 22px;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    z-index: 1000;
  }

  @media (max-width: 1024px) {
    .mobile-menu-btn {
      display: inline-flex;
    }

    .header-navigation {
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      background: rgba(0, 150, 255, 1);
      position: absolute;
      top: 100%;
      left: 0;
      width: 100vw;
      min-width: 200px;
      padding: 10px 0 10px 0;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      display: none;
    }

    .header-navigation.open {
      display: flex;
    }

    .nav-item,
    .dropdown-title {
      width: 100%;
      text-align: left;
      padding: 14px 20px 12px 20px;
    }

    .dropdown-menu {
      position: static;
      min-width: 100%;
      box-shadow: none;
      border-radius: 0;
      border-top: none;
      background: rgba(0, 150, 255, 0.98);
      margin-top: 0;
    }

    .dropdown-menu .dropdown-item {
      padding: 12px 28px;
    }
  }


  /* Bars */
  .mobile-menu-btn .bar {
    display: block;
    height: 3px;
    width: 100%;
    background-color: white;
    /* changed to white */
    border-radius: 2px;
    transition: all 0.4s ease;
    transform-origin: center;
  }



  /* Animate to X when active */
  .mobile-menu-btn.active .top {
    transform: rotate(45deg) translate(0, 7px);
    /* adjust Y for perfect cross */
  }

  .mobile-menu-btn.active .middle {
    opacity: 0;
  }

  .mobile-menu-btn.active .bottom {
    transform: rotate(-45deg) translate(0, -7px);
    /* adjust Y for perfect cross */
  }
</style>

<script>
  const menuBtn = document.querySelector('.mobile-menu-btn');
  const nav = document.querySelector('.header-navigation');

  menuBtn.addEventListener('click', () => {
    menuBtn.classList.toggle('active');
    nav.classList.toggle('open');
  });
</script>
