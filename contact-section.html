<!-- Contact Section -->
<section class="contact-section">
    <div class="container contact-container">

        <!-- Left Column -->
        <div class="contact-info-block">
            <h2>Let's Connect</h2>
            <p class="contact-sub">We're here to support patients, physiotherapists, colleges, trainers,
                partners, and franchise applicants</p>

            <ul class="contact-list">
                <li>
                    <div class="c-icon"><img src="assets/icons/basil_envelope-outline.svg" alt="Mail"
                            onerror="this.style.display='none'"></div>
                    <div class="c-text">
                        <span class="c-label">Mail:</span>
                        <strong>Info@getmyphysio.in</strong>
                    </div>
                </li>
                <li>
                    <div class="c-icon"><img src="assets/icons/ph_buildings.svg" alt="Hours"
                            onerror="this.style.display='none'"></div>
                    <div class="c-text">
                        <span class="c-label">Support Hours :</span>
                        <strong>Monday - Saturday | 10:00 AM - 6:00 PM</strong>
                    </div>
                </li>
                <li>
                    <div class="c-icon"><img src="assets/icons/ph_phone-call.svg" alt="Phone"
                            onerror="this.style.display='none'"></div>
                    <div class="c-text">
                        <span class="c-label">Helpline :</span>
                        <strong>8130555555</strong>
                    </div>
                </li>
            </ul>

            <div class="social-wrapper-contact">

            </div>
        </div>

        <!-- Right Column -->
        <div class="contact-form-block">
            <form class="main-contact-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="c-name">Name</label>
                        <input type="text" id="c-name" placeholder="Enter your name">
                    </div>
                    <div class="input-group">
                        <label for="c-mobile">Mobile</label>
                        <input type="tel" id="c-mobile" placeholder="+91">
                    </div>
                    <div class="input-group">
                        <label for="c-email">Email</label>
                        <input type="email" id="c-email" placeholder="Name@company.com">
                    </div>
                    <div class="input-group">
                        <label for="c-city">City</label>
                        <input type="text" id="c-city" placeholder="Your city">
                    </div>
                    <div class="input-group">
                        <label for="c-role">I am a</label>
                        <select id="c-role">
                            <option value="" disabled selected>Select</option>
                            <option value="patient">Patient</option>
                            <option value="physio">Physiotherapist</option>
                            <option value="placement_officer">Placement Officer</option>
                            <option value="institute_representative">Institute Representative</option>
                            <option value="authorised_representative_hospital">Authorised Representative of Hospital
                            </option>
                            <option value="corporate_partner">Corporate Partner</option>
                            <option value="investor">Investor</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="input-group" id="other-role-group" style="display: none;">
                        <label for="c-other-role">Please specify</label>
                        <input type="text" style="margin-top: 6px;" id="c-other-role" placeholder="Enter your role">
                    </div>
                    <div class="input-group">
                        <label for="c-subject">Subject</label>
                        <select id="c-subject">
                            <option value="" disabled selected>What is this about</option>
                            <option value="city_expansion_enquiries">City Expansion Enquiries</option>
                            <option value="corporate_partnership">Corporate Partnership</option>
                            <option value="investor_enquiry">Investor Enquiry</option>
                            <!-- <option value="mention_subject">Mention your subject</option> -->
                            <option value="patient_support">Patient Support</option>
                            <option value="physiotherapist_registration">Physiotherapist Registration</option>
                            <option value="support">Support</option>
                            <option value="others">Others</option>
                        </select>
                    </div>
                    <div class="input-group" id="other-subject-group" style="display: none;">
                        <label for="c-other-subject">Please specify</label>
                        <input type="text" id="c-other-subject" style="margin-top: 6px;"
                            placeholder="Enter your subject">
                    </div>
                </div>
                <div class="input-group message-group">
                    <label for="c-message">Message</label>
                    <textarea id="c-message" rows="4" placeholder="How can we help you ?"></textarea>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="c-agree">
                    <label for="c-agree">I agree to the privacy policy and terms of service.</label>
                </div>
                <button type="submit" class="btn btn-primary btn-submit-contact">Send Message</button>
            </form>
        </div>

    </div>
</section>
