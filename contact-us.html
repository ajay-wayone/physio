<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Physio - India's First Verified Physiotherapy Platform</title>
    <meta name="description"
        content="Skill-Ranked. Psychometrically Screened. Police Verified. Connecting Patients & Physiotherapists Through Structured Technology.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header Section placeholder -->
    <div include-html="header.html"></div>

    <main>
        <!-- PAGE_CONTENT_START -->

        <!-- Contact Section -->
        <section class="contact-section-contact-us">
            <div class="container contact-container">

                <!-- Left Column -->
                <div class="contact-info-block">
                    <h2>Let's Connect</h2>
                    <p class="contact-sub">We're here to support patients, physiotherapists, colleges, trainers,
                        partners, and franchise applicants</p>

                    <ul class="contact-list">
                        <li>
                            <div class="c-icon"><img src="assets/icons/basil_envelope-outline.svg" alt="Mail"
                                    onerror="this.style.display='none'"></div>
                            <div class="c-text">
                                <span class="c-label">Mail:</span>
                                <strong>Info@getmyphysio.in</strong>
                            </div>
                        </li>
                        <li>
                            <div class="c-icon"><img src="assets/icons/ph_buildings.svg" alt="Hours"
                                    onerror="this.style.display='none'"></div>
                            <div class="c-text">
                                <span class="c-label">Support Hours :</span>
                                <strong>Monday - Saturday | 10:00 AM - 6:00 PM</strong>
                            </div>
                        </li>
                        <li>
                            <div class="c-icon"><img src="assets/icons/ph_phone-call.svg" alt="Phone"
                                    onerror="this.style.display='none'"></div>
                            <div class="c-text">
                                <span class="c-label">Helpline :</span>
                                <strong>8130555555</strong>
                            </div>
                        </li>
                    </ul>

                    <div class="social-wrapper-contact">
                        <p>Follow us:</p>
                        <div class="social-icons">
                            <a href="#" class="social-icon-blue"><svg width="20" height="20" viewBox="0 0 24 24"
                                    fill="currentColor">
                                    <path
                                        d="M14 13.5h2.5l1-4H14v-2c0-1.03 0-2 2-2h1.5V2.14c-.326-.043-1.557-.14-2.857-.14-2.82 0-4.643 1.706-4.643 4.76V9.5H8v4h2v9h4v-9z" />
                                </svg></a>
                            <a href="#" class="social-icon-blue"><svg width="20" height="20" viewBox="0 0 24 24"
                                    fill="currentColor">
                                    <path
                                        d="M4.98 3.5c0 1.381-1.11 2.5-2.48 2.5s-2.48-1.119-2.48-2.5c0-1.38 1.11-2.5 2.48-2.5s2.48 1.12 2.48 2.5zm.02 4.5h-5v16h5v-16zm7.982 0h-4.968v16h4.969v-8.399c0-4.67 6.029-5.052 6.029 0v8.399h4.988v-10.131c0-7.88-8.922-7.593-11.018-3.714v-2.155z" />
                                </svg></a>
                            <a href="#" class="social-icon-blue"><svg width="20" height="20" viewBox="0 0 24 24"
                                    fill="currentColor">
                                    <path
                                        d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" />
                                </svg></a>
                            <a href="#" class="social-icon-blue"><svg width="20" height="20" viewBox="0 0 24 24"
                                    fill="currentColor">
                                    <path
                                        d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z" />
                                </svg></a>
                        </div>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="contact-form-block">
                    <form class="main-contact-form">
                        <div class="form-grid">
                            <div class="input-group">
                                <label for="c-name">Name</label>
                                <input type="text" id="c-name" placeholder="Enter your name">
                            </div>
                            <div class="input-group">
                                <label for="c-mobile">Mobile</label>
                                <input type="tel" id="c-mobile" placeholder="+91">
                            </div>
                            <div class="input-group">
                                <label for="c-email">Email</label>
                                <input type="email" id="c-email" placeholder="Name@company.com">
                            </div>
                            <div class="input-group">
                                <label for="c-city">City</label>
                                <input type="text" id="c-city" placeholder="Your city">
                            </div>
                            <div class="input-group">
                                <label for="c-role">I am a</label>
                                <select id="c-role">
                                    <option value="" disabled selected>Select</option>
                                    <option value="patient">Patient</option>
                                    <option value="physio">Physiotherapist</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label for="c-subject">Subject</label>
                                <input type="text" id="c-subject" placeholder="What is this about">
                            </div>
                        </div>
                        <div class="input-group message-group">
                            <label for="c-message">Message</label>
                            <textarea id="c-message" rows="4" placeholder="How can we help you ?"></textarea>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="c-agree">
                            <label for="c-agree">I agree to the privacy policy and terms of service.</label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-submit-contact">Send Message</button>
                    </form>
                </div>

            </div>
        </section>

        <!-- PAGE_CONTENT_END -->

        <!-- Main Footer placeholder -->
        <div include-html="footer.html"></div>
    </main>

    <!-- HTML Inclusion Script -->
    <script src="js/include.js"></script>
</body>

</html>
